<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruno Chess Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:          #1a1a1a;
    --panel:       #242424;
    --border:      #333;
    --light-sq:    #eeeed2;
    --dark-sq:     #769656;
    --selected:    #f6f669;
    --legal:       rgba(0,0,0,0.18);
    --last-move:   rgba(255,255,100,0.40);
    --check:       rgba(220,50,50,0.75);
    --text:        #e8e8e8;
    --muted:       #888;
    --accent:      #81b64c;
    --accent2:     #b58863;
    --danger:      #e25c4c;
    --log-bg:      #1e1e1e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .game-wrap {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  /* ——— Board ——— */
  .board-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .player-tag {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: var(--text);
    padding: 8px 4px;
  }
  .player-tag .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-tag.white .dot { background: #f0f0f0; border: 2px solid #aaa; }
  .player-tag.black .dot { background: #333; border: 2px solid #777; }
  .player-tag .name { font-weight: 500; }
  .player-tag .rating { color: var(--muted); font-size: 0.72rem; }
  .turn-indicator {
    margin-left: auto;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent);
    color: #fff;
    letter-spacing: 0.08em;
    display: none;
  }
  .player-tag.active .turn-indicator { display: block; }

  .board-frame {
    border: 3px solid #333;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    position: relative;
  }

  .board-inner {
    display: flex;
  }

  .rank-labels, .file-labels-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    width: 22px;
    background: #2a2a2a;
  }
  .rank-labels span {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    line-height: 1;
    user-select: none;
  }

  .board-grid-wrap {
    display: flex;
    flex-direction: column;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 80px);
    grid-template-rows: repeat(8, 80px);
    cursor: pointer;
  }

  .file-labels {
    display: flex;
    background: #2a2a2a;
    height: 22px;
  }
  .file-labels span {
    width: 80px;
    text-align: center;
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 22px;
    user-select: none;
  }

  .sq {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.1s;
    user-select: none;
  }
  .sq.light { background: var(--light-sq); }
  .sq.dark  { background: var(--dark-sq); }
  .sq.selected { background: var(--selected) !important; }
  .sq.last-from, .sq.last-to { background: var(--last-move) !important;
    /* blend last-move color over the square color */
  }
  .sq.last-from.light { background: color-mix(in srgb, var(--last-move) 60%, var(--light-sq)) !important; }
  .sq.last-from.dark  { background: color-mix(in srgb, var(--last-move) 60%, var(--dark-sq)) !important; }
  .sq.last-to.light   { background: color-mix(in srgb, var(--last-move) 60%, var(--light-sq)) !important; }
  .sq.last-to.dark    { background: color-mix(in srgb, var(--last-move) 60%, var(--dark-sq)) !important; }
  .sq.in-check        { background: var(--check) !important; }

  /* Legal move dots */
  .sq.legal-move::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    pointer-events: none;
    z-index: 1;
  }
  .sq.legal-capture::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: transparent;
    border: 7px solid rgba(0,0,0,0.20);
    pointer-events: none;
    z-index: 1;
  }

  .piece {
    font-size: 58px;
    line-height: 1;
    position: relative;
    z-index: 2;
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    transition: transform 0.08s;
    pointer-events: none;
    /* chess.com-style rendering: white pieces are hollow/white, black are solid */
  }

  /* ——— Sidebar ——— */
  .sidebar {
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    margin-bottom: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Status */
  #status-text {
    font-size: 0.82rem;
    line-height: 1.6;
    min-height: 44px;
    color: var(--text);
  }
  #status-text.thinking { color: var(--accent2); }
  #status-text.error    { color: var(--danger); }
  #status-text.gameover { color: var(--accent); font-weight: 700; }

  /* Thinking spinner */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--accent2);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Depth control */
  .depth-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .depth-row label { font-size: 0.78rem; color: var(--muted); }
  #depth-val {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    width: 28px;
    text-align: center;
  }
  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: filter 0.15s, transform 0.1s;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.secondary { background: #333; color: var(--text); }
  .btn.danger { background: var(--danger); color: #fff; }

  /* Move log */
  #move-log {
    background: var(--log-bg);
    border-radius: 6px;
    padding: 10px;
    font-size: 0.76rem;
    line-height: 1.8;
    max-height: 220px;
    overflow-y: auto;
    color: var(--text);
  }
  #move-log::-webkit-scrollbar { width: 5px; }
  #move-log::-webkit-scrollbar-track { background: transparent; }
  #move-log::-webkit-scrollbar-thumb { background: #444; border-radius: 99px; }

  .move-pair { display: flex; gap: 6px; margin-bottom: 2px; }
  .move-num  { color: var(--muted); min-width: 28px; }
  .move-white, .move-black { min-width: 60px; }
  .move-white { color: #ddd; }
  .move-black { color: #aaa; }

  /* Promotion modal */
  #promo-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #promo-modal.show { display: flex; }
  .promo-box {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
  }
  .promo-box h3 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 20px;
    font-size: 1.2rem;
  }
  .promo-choices { display: flex; gap: 12px; }
  .promo-btn {
    width: 70px; height: 70px;
    font-size: 52px;
    background: #333;
    border: 2px solid #555;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .promo-btn:hover { background: #444; border-color: var(--accent); }

  /* Captured pieces */
  .captured { font-size: 1.1rem; letter-spacing: 2px; min-height: 22px; }

  footer {
    margin-top: 24px;
    font-size: 0.68rem;
    color: #555;
    text-align: center;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <h1>Chess with <span>Bruno</span></h1>
  <p>Minimax · Alpha-Beta · Piece-Square Tables · Quiescence</p>
</header>

<div class="game-wrap">

  <!-- Board Column -->
  <div class="board-col">
    <!-- Black player tag (top) -->
    <div class="player-tag black" id="tag-black">
      <div class="dot"></div>
      <div>
        <div class="name">Bruno</div>
        <div class="rating">Engine</div>
      </div>
      <div class="turn-indicator">To Move</div>
    </div>

    <div class="board-frame">
      <div class="board-inner">
        <div class="rank-labels" id="rank-labels"></div>
        <div class="board-grid-wrap">
          <div id="board"></div>
          <div class="file-labels" id="file-labels"></div>
        </div>
      </div>
    </div>

    <!-- White player tag (bottom) -->
    <div class="player-tag white active" id="tag-white">
      <div class="dot"></div>
      <div>
        <div class="name">You</div>
        <div class="rating">Human</div>
      </div>
      <div class="turn-indicator">To Move</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card">
      <h3>Status</h3>
      <div id="status-text">Your turn. Click a piece to move.</div>
    </div>

    <div class="card">
      <h3>Bruno Depth</h3>
      <div class="depth-row">
        <label>Depth</label>
        <input type="range" id="depth-slider" min="1" max="5" value="4" step="1">
        <div id="depth-val">4</div>
      </div>
    </div>

    <div class="card">
      <h3>Controls</h3>
      <div class="btn-row">
        <button class="btn primary" id="btn-new">New Game</button>
        <button class="btn secondary" id="btn-undo">Undo</button>
        <button class="btn secondary" id="btn-flip">Flip</button>
      </div>
    </div>

    <div class="card">
      <h3>Move History</h3>
      <div id="move-log"><span style="color:#555">—</span></div>
    </div>

    <div class="card">
      <h3>Captured Pieces</h3>
      <div class="captured" id="cap-white"></div>
      <div class="captured" id="cap-black"></div>
    </div>

  </div>
</div>

<footer>Bruno v4 · Python chess logic via Anthropic API</footer>

<!-- Promotion modal -->
<div id="promo-modal">
  <div class="promo-box">
    <h3>Promote Pawn</h3>
    <div class="promo-choices" id="promo-choices"></div>
  </div>
</div>

<script>
// ============================================================
// Chess.com-style Unicode pieces
// White pieces: ♔♕♖♗♘♙  (filled-looking, white color)
// Black pieces: ♔♕♖♗♘♙  (same glyphs, black color — chess.com style)
// ============================================================
const PIECE_UNICODE = {
  // white
  wK: '♔', wQ: '♕', wR: '♖', wB: '♗', wN: '♘', wP: '♙',
  // black
  bK: '♚', bQ: '♛', bR: '♜', bB: '♝', bN: '♞', bP: '♟',
};

const PIECE_CSS_COLOR = { w: '#fff', b: '#1a1a1a' };

// ============================================================
// State
// ============================================================
let gameState = null;     // { board, turn, history, captured, ... }
let selectedSquare = null;
let legalMovesForSelected = [];
let lastMove = null;
let boardFlipped = false;
let isThinking = false;
let pendingPromoMove = null;

const DEPTH_DEFAULT = 4;

// ============================================================
// Boot
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  buildBoardDOM();
  buildLabels();
  newGame();

  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-undo').addEventListener('click', undoMove);
  document.getElementById('btn-flip').addEventListener('click', flipBoard);
  document.getElementById('depth-slider').addEventListener('input', e => {
    document.getElementById('depth-val').textContent = e.target.value;
  });
});

// ============================================================
// Board DOM
// ============================================================
function buildBoardDOM() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 7; r >= 0; r--) {
    for (let f = 0; f < 8; f++) {
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r + f) % 2 === 0 ? 'dark' : 'light');
      sq.dataset.rank = r;
      sq.dataset.file = f;
      sq.addEventListener('click', onSquareClick);
      board.appendChild(sq);
    }
  }
}

function buildLabels() {
  const files = ['a','b','c','d','e','f','g','h'];
  const rankLabels = document.getElementById('rank-labels');
  const fileLabels = document.getElementById('file-labels');
  rankLabels.innerHTML = '';
  fileLabels.innerHTML = '';

  // Ranks 8→1 top to bottom when not flipped
  for (let r = 7; r >= 0; r--) {
    const s = document.createElement('span');
    s.textContent = boardFlipped ? (r + 1) : (8 - r);
    rankLabels.appendChild(s);
  }

  const fileOrder = boardFlipped ? [...files].reverse() : files;
  fileOrder.forEach(f => {
    const s = document.createElement('span');
    s.textContent = f;
    fileLabels.appendChild(s);
  });
}

// ============================================================
// New Game
// ============================================================
async function newGame() {
  if (isThinking) return;
  selectedSquare = null;
  legalMovesForSelected = [];
  lastMove = null;
  pendingPromoMove = null;

  gameState = await callAPI({
    action: 'new_game'
  });

  renderBoard();
  setStatus("Your turn. Click a piece to move.", '');
  renderMoveLog();
  renderCaptured();
  updateTurnTags();
}

// ============================================================
// Square click
// ============================================================
async function onSquareClick(e) {
  if (!gameState || isThinking || gameState.game_over) return;
  if (gameState.turn !== 'white') return;

  const r = parseInt(e.currentTarget.dataset.rank);
  const f = parseInt(e.currentTarget.dataset.file);
  const sqName = squareName(r, f);

  if (selectedSquare) {
    // Try to make the move
    const isLegal = legalMovesForSelected.find(m => m.to === sqName);
    if (isLegal) {
      // Check promotion
      if (isLegal.promotion) {
        pendingPromoMove = isLegal;
        showPromoModal(isLegal.from, sqName);
        return;
      }
      await makePlayerMove(isLegal.uci);
      return;
    }

    // Re-select if clicking own piece
    const piece = getPieceAt(r, f);
    if (piece && piece.color === 'w') {
      selectedSquare = sqName;
      legalMovesForSelected = gameState.legal_moves.filter(m => m.from === sqName);
      renderBoard();
      return;
    }

    // Deselect
    selectedSquare = null;
    legalMovesForSelected = [];
    renderBoard();
    return;
  }

  // Select own piece
  const piece = getPieceAt(r, f);
  if (piece && piece.color === 'w') {
    selectedSquare = sqName;
    legalMovesForSelected = gameState.legal_moves.filter(m => m.from === sqName);
    renderBoard();
  }
}

// ============================================================
// Make player move + Bruno response
// ============================================================
async function makePlayerMove(uci) {
  selectedSquare = null;
  legalMovesForSelected = [];

  isThinking = true;
  setStatus("Bruno is thinking...", 'thinking', true);

  const depth = parseInt(document.getElementById('depth-slider').value);

  try {
    const result = await callAPI({
      action: 'make_move',
      state: gameState,
      move_uci: uci,
      depth: depth
    });

    gameState = result;
    lastMove = result.last_move || null;
    renderBoard();
    renderMoveLog();
    renderCaptured();
    updateTurnTags();

    if (result.game_over) {
      const msg = getResultMessage(result.result);
      setStatus(msg, 'gameover');
    } else if (result.turn === 'white') {
      setStatus("Your turn.", '');
    } else {
      setStatus("Bruno is thinking...", 'thinking', true);
    }
  } catch (err) {
    setStatus("Error: " + err.message, 'error');
  }

  isThinking = false;
}

// ============================================================
// Undo
// ============================================================
async function undoMove() {
  if (!gameState || isThinking || (gameState.history || []).length < 2) return;
  selectedSquare = null;
  legalMovesForSelected = [];

  const result = await callAPI({ action: 'undo', state: gameState });
  if (result) {
    gameState = result;
    lastMove = result.last_move || null;
    renderBoard();
    renderMoveLog();
    renderCaptured();
    updateTurnTags();
    setStatus("Move undone. Your turn.", '');
  }
}

// ============================================================
// Flip board
// ============================================================
function flipBoard() {
  boardFlipped = !boardFlipped;
  buildBoardDOM();
  buildLabels();
  renderBoard();
}

// ============================================================
// Promotion modal
// ============================================================
function showPromoModal(from, to) {
  const pieces = [
    { key: 'q', sym: '♕', bsym: '♛' },
    { key: 'r', sym: '♖', bsym: '♜' },
    { key: 'b', sym: '♗', bsym: '♝' },
    { key: 'n', sym: '♘', bsym: '♞' },
  ];
  const choices = document.getElementById('promo-choices');
  choices.innerHTML = '';
  pieces.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'promo-btn';
    btn.innerHTML = `<span style="color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.5)">${p.sym}</span>`;
    btn.addEventListener('click', () => {
      document.getElementById('promo-modal').classList.remove('show');
      makePlayerMove(from + to + p.key);
    });
    choices.appendChild(btn);
  });
  document.getElementById('promo-modal').classList.add('show');
}

// ============================================================
// Render board
// ============================================================
function renderBoard() {
  if (!gameState) return;
  const squares = document.querySelectorAll('.sq');

  squares.forEach(sq => {
    const r = parseInt(sq.dataset.rank);
    const f = parseInt(sq.dataset.file);
    const sqN = squareName(r, f);

    // Reset classes
    sq.className = 'sq ' + ((r + f) % 2 === 0 ? 'dark' : 'light');
    sq.innerHTML = '';

    // Last move highlight
    if (lastMove) {
      if (sqN === lastMove.from) sq.classList.add('last-from');
      if (sqN === lastMove.to)   sq.classList.add('last-to');
    }

    // Selected
    if (sqN === selectedSquare) sq.classList.add('selected');

    // Legal move overlay
    const legal = legalMovesForSelected.find(m => m.to === sqN);
    if (legal) {
      const hasPiece = getPieceAt(r, f);
      sq.classList.add(hasPiece ? 'legal-capture' : 'legal-move');
    }

    // Check highlight
    if (gameState.check_square && sqN === gameState.check_square) {
      sq.classList.add('in-check');
    }

    // Piece
    const piece = getPieceAt(r, f);
    if (piece) {
      const span = document.createElement('span');
      span.className = 'piece';
      const key = piece.color + piece.type.toUpperCase();
      span.textContent = PIECE_UNICODE[key] || '?';
      span.style.color = piece.color === 'w' ? '#fff' : '#111';
      // chess.com style: white pieces have a dark outline, black pieces are solid dark
      if (piece.color === 'w') {
        span.style.textShadow = '0 0 2px #000, 0 0 3px #333, 1px 1px 3px rgba(0,0,0,0.8)';
        span.style.filter = 'drop-shadow(0 1px 2px rgba(0,0,0,0.7))';
      } else {
        span.style.textShadow = '0 1px 3px rgba(0,0,0,0.3)';
      }
      sq.appendChild(span);
    }
  });
}

// ============================================================
// Helpers
// ============================================================
function squareName(rank, file) {
  return 'abcdefgh'[file] + (rank + 1);
}

function getPieceAt(rank, file) {
  const sqN = squareName(rank, file);
  return gameState.board[sqN] || null;
}

function setStatus(msg, cls = '', spinner = false) {
  const el = document.getElementById('status-text');
  el.className = cls;
  el.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + msg;
}

function getResultMessage(result) {
  if (!result) return 'Game Over.';
  if (result === '1-0') return '🏆 You win! Checkmate.';
  if (result === '0-1') return '🤖 Bruno wins by checkmate!';
  if (result === '1/2-1/2') return '🤝 Draw!';
  return 'Game Over: ' + result;
}

function updateTurnTags() {
  const isWhiteTurn = gameState && gameState.turn === 'white' && !gameState.game_over;
  const isBlackTurn = gameState && gameState.turn === 'black' && !gameState.game_over;
  document.getElementById('tag-white').classList.toggle('active', isWhiteTurn);
  document.getElementById('tag-black').classList.toggle('active', isBlackTurn || isThinking);
}

function renderMoveLog() {
  const log = document.getElementById('move-log');
  const history = gameState.history || [];
  if (!history.length) { log.innerHTML = '<span style="color:#555">—</span>'; return; }

  let html = '';
  for (let i = 0; i < history.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const w = history[i]   || '';
    const b = history[i+1] || '';
    html += `<div class="move-pair"><span class="move-num">${num}.</span><span class="move-white">${w}</span><span class="move-black">${b}</span></div>`;
  }
  log.innerHTML = html;
  log.scrollTop = log.scrollHeight;
}

function renderCaptured() {
  const capW = document.getElementById('cap-white');
  const capB = document.getElementById('cap-black');
  const cap = gameState.captured || { white: [], black: [] };

  const mapPiece = (p, color) => {
    const key = color + p.toUpperCase();
    return `<span style="color:${color === 'w' ? '#fff' : '#111'};text-shadow:0 1px 2px rgba(0,0,0,0.5)">${PIECE_UNICODE[key] || p}</span>`;
  };

  capW.innerHTML = (cap.black || []).map(p => mapPiece(p, 'w')).join('');  // pieces white lost
  capB.innerHTML = (cap.white || []).map(p => mapPiece(p, 'b')).join('');  // pieces black lost
}
